<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Faculty Dashboard | LeaveItToUs</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        body {
            font-family: "Inter", sans-serif;
            margin: 0;
            background-color: #f4f7fb;
        }

        /* ===== HEADER ===== */
        .header {
            background-color: #004E9B;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 25px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 45px;
            height: 45px;
        }

        .faculty-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .faculty-info img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        .faculty-info h2 {
            margin: 0;
            font-size: 18px;
        }

        .faculty-info p {
            margin: 0;
            font-size: 14px;
            color: #d0d0d0;
        }

        .logout-btn {
            background-color: #f44336;
            color: white;
            padding: 6px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        .logout-btn:hover {
            background-color: #c62828;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 25%;
            background-color: #e8eef7;
            padding: 20px;
            overflow-y: auto;
            border-right: 2px solid #cfd8e3;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: #003366;
        }

        .student-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .student-btn {
            background: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .student-btn:hover {
            background-color: #cfd8e3;
        }

        /* ===== CONTENT AREA ===== */
        .content-panel {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .student-details {
            background-color: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }

        .student-card h2 {
            color: #004E9B;
        }

        .student-card p {
            margin: 8px 0;
            font-size: 15px;
        }

        .student-card a {
            color: #1a73e8;
            text-decoration: none;
        }

        .student-card a:hover {
            text-decoration: underline;
        }

        /* ===== ACTION BUTTONS ===== */
        .action-buttons {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .approve-btn, .reject-btn {
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .approve-btn {
            background-color: #4caf50;
        }

        .approve-btn:hover {
            background-color: #2e7d32;
        }

        .reject-btn {
            background-color: #f44336;
        }

        .reject-btn:hover {
            background-color: #b71c1c;
        }

        /* ===== FOOTER ===== */
        .footer {
            background-color: #004E9B;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="logo">
            <img th:src="@{/images/logo.png}" alt="College Logo" />
            <h1>LeaveItToUs</h1>
        </div>

        <div class="faculty-info">
            <img th:src="@{/images/profile.png}" alt="Faculty Photo" />
            <div>
                <h2 th:text="${faculty.name}">Faculty Name</h2>
                <p th:text="${faculty.emailId}">faculty@sece.ac.in</p>
            </div>
        </div>

        <div class="logout">
            <a th:href="@{/logout}" class="logout-btn">Logout</a>
        </div>
    </header>

    <!-- ===== MAIN CONTAINER ===== -->
    <main class="main-container">
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar">
            <h3>Pending Leave Requests</h3>

            <div th:if="${#lists.isEmpty(leaveRequests)}">
                <p>No leave requests found.</p>
            </div>

            <div class="student-list" th:each="req : ${leaveRequests}">
                <button class="student-btn"
                        th:text="${req.student.rollNo}"
                        th:data-rollno="${req.student.rollNo}"
                        th:data-status="${req.status}"
                        onclick="showStudentDetails(this)">
                </button>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <section class="content-panel">
            <div id="studentDetailsContainer" class="student-details">
                <h2>Select a student to view leave details</h2>
            </div>
            <div th:if="${successMessage}" 
                style="background:#d4edda;color:#155724;padding:10px;border-radius:5px;margin-bottom:10px;">
                <p th:text="${successMessage}"></p>
            </div>

            <div th:if="${errorMessage}" 
                style="background:#f8d7da;color:#721c24;padding:10px;border-radius:5px;margin-bottom:10px;">
                <p th:text="${errorMessage}"></p>
            </div>

        </section>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <p>© 2025 LeaveItToUs | Sri Eshwar College of Engineering</p>
    </footer>

    <!-- ===== JS SCRIPT ===== -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const leaveRequests = /*[[${leaveRequests}]]*/ [];

        function showStudentDetails(button) {
            const rollNo = button.getAttribute("data-rollno");
            const request = leaveRequests.find(r => r.student.rollNo === rollNo);

            if (!request) {
                document.getElementById("studentDetailsContainer").innerHTML =
                    `<p>No details found for ${rollNo}</p>`;
                return;
            }

            const html = `
                <div class="student-card">
                    <h2>Student Roll No: ${request.student.rollNo}</h2>
                    <p><strong>From:</strong> ${request.fromDate} (${request.fromTime})</p>
                    <p><strong>To:</strong> ${request.toDate} (${request.toTime})</p>
                    <p><strong>Status:</strong> ${getStatusText(request.status)}</p>
                    <p><strong>Applied On:</strong> ${request.appliedTime}</p>
                    ${request.filePath ? `
                        <p><strong>Attachment:</strong>
                            <a href="/${request.filePath}" target="_blank">View File</a>
                        </p>` : ''}
                    <div class="action-buttons">
                        <form method="post" action="/faculty/approve-leave">
                            <input type="hidden" name="leaveId" value="${request.leaveId}" />
                            <button type="submit" class="approve-btn">Approve</button>
                        </form>

                        <form method="post" action="/faculty/reject-leave">
                            <input type="hidden" name="leaveId" value="${request.leaveId}" />
                            <button type="submit" class="reject-btn">Reject</button>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById("studentDetailsContainer").innerHTML = html;
        }

        function getStatusText(status) {
            switch (status) {
                case "S": return "Pending (Student Applied)";
                case "FA": return "Faculty Approved";
                case "FR": return "Faculty Rejected";
                case "HA": return "HOD Approved";
                case "HR": return "HOD Rejected";
                default: return "Unknown";
            }
        }
        /*]]>*/
    </script>
</body>
</html>
